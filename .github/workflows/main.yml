name: Actualizador de Datos Diario

on:
  schedule:
    # Corre a las 08:00 UTC (Aprox 04:00 AM en Chile)
    - cron: '0 8 * * *'
  workflow_dispatch: # Esto te permite darle al botón "Run" manualmente para probar

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: |
          pip install pandas lxml html5lib requests numpy soccerdata

      - name: Ejecutar Actualización
        run: python actualizador_database.py

      - name: Guardar Cambios en GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add database_partidos.db
          git commit -m "Auto-update: Resultados y Stats de FBRef" || echo "No hay cambios para subir"
          git push
