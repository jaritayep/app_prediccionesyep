name: Actualizar Jornada Semanal

on:
  schedule:
    - cron: '0 8 * * 1' # Todos los lunes a las 08:00 UTC
  workflow_dispatch:    # Permite la ejecución manual desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Ejecutar actualizador
        run: python actualizar_jornadas.py
        env:
          # Si usas una API KEY guardada en Secrets de GitHub, se pasa así:
          API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}

      - name: Subir cambios a la base de datos
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add database_partidos.db
          git commit -m "Auto-update: Jornadas semanales actualizadas" || echo "No hay cambios para subir"
          git push
